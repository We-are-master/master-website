<body class="fn-body" data-fn="conversational">

<div class="fn-top">
  <div class="fn-top-in">
    <a href="index.html" class="g-brand">
      <img src="/brand/fixfy-primary-white.png" alt="Fixfy" class="g-brand-logo g-brand-logo--word g-on-dark"/>
      <img src="/brand/fixfy-primary-navy.png" alt="Fixfy" class="g-brand-logo g-brand-logo--word g-on-light"/>

    <a href="index.html" class="fn-exit">Exit ✕</a>
  </div>
</div>

<main id="fn-root"></main>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "funnelStyle": "conversational"
}/*EDITMODE-END*/;
window.GROWTH_TWEAKS = {
  defaults: TWEAK_DEFAULTS,
  controls: [
    { type:'radio', key:'funnelStyle', label:'Funnel UX direction',
      options:[{label:'Conversational',value:'conversational'},{label:'Guided rail',value:'sidebar'}] }
  ],
  apply(s){ if (window.__fnSetDir) window.__fnSetDir(s.funnelStyle); else document.body.dataset.fn = s.funnelStyle; }
};
</script>
<script src="growth-config.js?v=2"></script>

<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<title>Join Fixfy Network</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<base href="/network/"/>
<link rel="stylesheet" href="/growth/growth.css?v=14"/>
<link rel="stylesheet" href="/growth/funnel.css?v=31"/>
<link rel="stylesheet" href="/network/funnel.css?v=8"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
</head>
<body class="fn-body nw-fn-body" data-fn="conversational">

<div class="nw-ambient" aria-hidden="true">
  <div class="nw-atmos">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="nw-cin-grid"></div>
  <div class="nw-cin-vignette"></div>

<div class="fn-top">

      <img src="/network/fixfy-white.png" alt="Fixfy" style="height:32px"/>
    </a>

    <span class="fn-step-label" id="nw-step-label">Start</span>
    <a href="index.html" class="fn-exit">Exit ✕</a>
  </div>
</div>

<main id="nw-root" class="fn-shell"></main>

<script src="network-config.js?v=1"></script>
<script src="network-checkout.js?v=3"></script>

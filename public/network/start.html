<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<title>Join Fixfy Network</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
<script src="network-config.js?v=2"></script>
<script>
(function () {
  var qs = new URLSearchParams(location.search);
  if (qs.get('pay') === '1' || qs.get('access') || qs.get('invite')) {
    location.replace('start-legacy.html' + location.search);
    return;
  }
  var cfg = window.NETWORK_CONFIG || window.GROWTH_CONFIG || {};
  var base = (cfg.partnerPortalGetStartedUrl || 'https://partners.getfixfy.com/get-started').replace(/\/$/, '');
  location.replace(base + location.search);
})();
</script>
</head>
<body style="margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui,sans-serif;background:#020040;color:#fff">
<p>Opening Fixfy Trade Portal…</p>
</body>
</html>
